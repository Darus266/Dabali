<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Woflè Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="dark-theme admin-body">
    
    <!-- Login Screen -->
    <div id="login-screen" class="admin-container glass">
        <h2 class="admin-title">Woflè <span>Admin</span></h2>
        <p class="admin-subtitle">Connexion au Dashboard</p>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="admin-user" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="input-group">
                <input type="password" id="admin-pass" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="cta-button primary full-width">Se Connecter</button>
        </form>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="dashboard-layout glass" style="display: none;">
        <div class="dashboard-header">
            <h2>Tableau de Bord Administrateur</h2>
            <button id="logout-btn" class="filter-btn">Déconnexion</button>
        </div>

        <div class="dashboard-content">
            <div class="add-dish-panel">
                <h3><i class="fas fa-plus-circle"></i> Ajouter un nouveau Mets</h3>
                <form id="add-dish-form">
                    <div class="input-group">
                        <label>Nom du Plat</label>
                        <input type="text" id="dish-name" placeholder="Ex: Alloco au Poulet" required>
                    </div>
                    <div class="input-group">
                        <label>Catégorie (Région)</label>
                        <select id="dish-category" class="styled-select" required>
                            <option value="lagunaire">Sud & Lagunes</option>
                            <option value="centre">Centre & Est</option>
                            <option value="ouest">Ouest Forestier</option>
                            <option value="nord">Nord Savane</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Prix</label>
                        <input type="text" id="dish-price" placeholder="Ex: 3 000 FCFA" required>
                    </div>
                    <div class="input-group">
                        <label>Image (Nom du fichier local ou URL)</label>
                        <input type="text" id="dish-img" placeholder="Ex: alloco.jpg ou https://..." required>
                    </div>
                    <div class="input-group">
                        <label>Description (Aperçu au survol)</label>
                        <textarea id="dish-desc" rows="3" placeholder="Description appétissante..." required></textarea>
                    </div>
                    <button type="submit" class="cta-button primary full-width">Publier le Mets</button>
                </form>
            </div>

            <div class="manage-dishes-panel">
                <h3><i class="fas fa-list"></i> Menus Actuels</h3>
                <div class="dishes-list" id="admin-dishes-list">
                    <!-- Généré dynamiquement -->
                </div>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="admin.js"></script>
</body>
</html>
